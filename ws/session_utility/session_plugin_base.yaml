---
parameters:
  dir_path: # will be set automatically by create_session.py
  before_command: # e.g. "echo test"
  ros_ip_key: # e.g. "machine_a ip"
  ros_master_hostname: "localhost"
  ros_master_port: 11311

  ros_core: false

  rec: false
  rec_command_1: "rosbag record --split --size=5120 -o ${dir_path}/rec_sync_ -e '(.*)_sync$'"
  rec_command_2:
  rec_command_3:
  rec_command_4:

  master_discovery: true
  discover_host_keys: # e.g. "machine_b ip + machine_c ip"
  rpc_port: 11611

  master_sync: true
  sync_remote_nodes: false
  check_host: true

  topic_relay_incoming: true
  topic_list_prefixes_incoming: # e.g. /machine_a or "/machine_a /machine_b"
  topic_list_paths_incoming:
  remove_target_prefix_incoming: # e.g. /machine_b

  topic_relay_outgoing: true
  topic_list_prefixes_outgoing: # e.g. "/machine_a /machine_b"
  target_prefix_outgoing: # e.g. /machine_a
  topic_list_paths_outgoing:
  outgoing_node_suffix: 

  topic_monitor: true

common:
  before_commands:
    - if [ '${before_command}' != "None" ]; then ${before_command}; fi
    - export ROS_IP=$(/ws/session_utility/resolve_keys.py -k "${ros_ip_key}")
    - echo ${ROS_IP}
    - export ROS_MASTER_URI=http://${ros_master_hostname}:${ros_master_port}

windows:
  - name: CORE
    if: ros_core
    layout: even-vertical
    splits:
      - commands:
        - roscore --port ${ros_master_port}
      - commands:
        - sleep 2
        - rosparam set enable_statistics true
    delay: 2.5
  - name: REC
    if: rec
    layout: even-vertical
    splits:
      - commands:
        - if [ "${rec_command_1}" == "None" ]; then exit; fi
        - "${rec_command_1}"
      - commands:
        - if [ "${rec_command_2}" == "None" ]; then exit; fi
        - "${rec_command_2}"
      - commands:
        - if [ "${rec_command_3}" == "None" ]; then exit; fi
        - "${rec_command_3}"
      - commands:
        - if [ "${rec_command_4}" == "None" ]; then exit; fi
        - "${rec_command_4}"
    delay: 1
  - name: DISC
    if: master_discovery
    splits:
      - commands:
        - echo ${discover_host_keys}
        - export DISCOVER_HOSTS=$(/ws/session_utility/resolve_keys.py -k "${discover_host_keys}")
        - echo ${DISCOVER_HOSTS}
        - export DISCOVER_HOSTS_COMMA=${DISCOVER_HOSTS// /,}
        - echo ${DISCOVER_HOSTS_COMMA}
        - rosrun fkie_master_discovery master_discovery _send_mcast:=False _listen_mcast:=False _robot_hosts:=[${DISCOVER_HOSTS_COMMA}] _rpc_port:=${rpc_port} _hide_services:=['/*']
  - name: SYNC
    if: master_sync
    splits:
      - commands:
        - /ws/session_utility/start_fkie_master_sync.py _check_host:="${check_host}" _sync_remote_nodes:="${sync_remote_nodes}" _topic_list_prefixes:="${topic_list_prefixes_incoming}" _topic_list_paths:="${topic_list_paths_incoming}"
  - name: IN
    if: topic_relay_incoming
    splits:
      - commands:
        - /ws/session_utility/topic_relay_incoming.py _topic_list_prefixes:="${topic_list_prefixes_incoming}" _remove_target_prefix:="${remove_target_prefix_incoming}" _topic_list_paths:="${topic_list_paths_incoming}"
  - name: OUT
    if: topic_relay_outgoing
    splits:
      - commands:
        - /ws/session_utility/topic_relay_outgoing.py _topic_list_prefixes:="${topic_list_prefixes_outgoing}" _target_prefix:="${target_prefix_outgoing}" _topic_list_paths:="${topic_list_paths_outgoing}" --suffix ${outgoing_node_suffix}
  - name: TOP
    if: topic_monitor
    splits:
      - commands:
        - /ws/session_utility/topics/topic_monitor.py