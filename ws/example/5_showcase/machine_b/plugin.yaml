parameters:
  host_ip: machine_b_ip
  host_name: machine_b
  ros_ip_key: machine_b_ip

  peers: machine_a_ip

  topic_list_paths_incoming: /ws/example/5_showcase/topics_a_to_b.txt
  topic_list_paths_outgoing: /ws/example/5_showcase/topics_b_to_a.txt

windows:
