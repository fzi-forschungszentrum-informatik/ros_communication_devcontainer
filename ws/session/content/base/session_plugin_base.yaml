---
parameters:
  dir_path: # will be set automatically by create_session.py
  before_command: # e.g. "echo test"
  ros_domain_id: # e.g. 47

  rec: false
  rec_command_1: "ros2 bag record -o ${dir_path}/rec_sync_ --regex '(.*)_sync$' --max-bag-size 5120"
  rec_command_2:
  rec_command_3:
  rec_command_4:

  sync: false
  # rmw_implementation: "rmw_cyclonedds_cpp"
  host_ip: # e.g. "machine_a ip"
  peers: # e.g. "machine_b ip + machine_c ip"
  topic_list_paths_incoming: "" # e.g. "/machine_a,/machine_b"
  topic_list_prefixes_incoming: "" # e.g. "/machine_a,/machine_b"
  remove_target_prefix_incoming: '""' # e.g. /machine_b
  topic_list_prefixes_outgoing: "" # e.g. "/machine_a,/machine_b"
  target_prefix_outgoing: '""' # e.g. /machine_a
  topic_list_paths_outgoing: "" # e.g. "/machine_a,/machine_b"
  sync_suffix: "_sync"
  qos_config_file: ""

  topic_monitor: false

  heartbeat: false
  heartbeat_topics:
  heartbeat_delay_topic_1:
  heartbeat_delay_topic_2:

  ros1_bridge: false
  ros1_ip_key: # e.g. "machine_a ip"
  ros1_master_hostname_key: "localhost"
  ros1_master_port: 11311

common:
  before_commands:
    - if [ '${before_command}' != "None" ]; then ${before_command}; fi
    - if [ '${ros_domain_id}' != "None" ]; then export ROS_DOMAIN_ID=${ros_domain_id}; fi

windows:
  - name: REC
    if: rec
    layout: even-vertical
    splits:
      - commands:
        - if [ "${rec_command_1}" == "None" ]; then exit; fi
        - "${rec_command_1}"
      - commands:
        - if [ "${rec_command_2}" == "None" ]; then exit; fi
        - "${rec_command_2}"
      - commands:
        - if [ "${rec_command_3}" == "None" ]; then exit; fi
        - "${rec_command_3}"
      - commands:
        - if [ "${rec_command_4}" == "None" ]; then exit; fi
        - "${rec_command_4}"
    delay: 1
  - name: SYNC
    if: sync
    splits:
      - commands:
        - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
            CYCLONEDDS_URI=$(/ws/dds_configs/get_cyclonedds_xml.py -i ${host_ip} -p "${peers}")
            ROS_STATIC_PEERS=$(/ws/session/content/get_data_dict_entries.py -k "${peers}")
            ros2 run com over_the_air_bridge
            --ros-args
            -p topic_list_paths_incoming:=[${topic_list_paths_incoming}]
            -p topic_list_prefixes_incoming:=[${topic_list_prefixes_incoming}]
            -p remove_target_prefix_incoming:='${remove_target_prefix_incoming}'
            -p topic_list_paths_outgoing:=[${topic_list_paths_outgoing}]
            -p topic_list_prefixes_outgoing:=[${topic_list_prefixes_outgoing}]
            -p target_prefix_outgoing:='${target_prefix_outgoing}'
            -p sync_suffix:='${sync_suffix}'
            -p qos_config_file:=${qos_config_file}
  - name: TOP
    if: topic_monitor
    splits:
      - commands:
        - ros2 run com topic_monitor
  - name: BEAT
    if: heartbeat
    splits:
      - commands:
        - ros2 run com heartbeat --ros-args -p topic_names:="${heartbeat_topics}"
      - commands:
        - if [ "${heartbeat_delay_topic_1}" == "None" ]; then exit; fi
        - ros2 topic delay "${heartbeat_delay_topic_1}"
      - commands:
        - if [ "${heartbeat_delay_topic_2}" == "None" ]; then exit; fi
        - ros2 topic delay "${heartbeat_delay_topic_2}"
  - name: ROS1
    if: ros1_bridge
    splits:
      - commands:
        - if [ '${ros_ip_key}' != "None" ]; then export ROS_IP=$(/ws/session/content/get_data_dict_entries.py -k "${ros1_ip_key}") && echo ${ROS1_IP}; fi
        - export ROS_MASTER_URI=http://$(/ws/session/content/get_data_dict_entries.py -k "${ros1_master_hostname_key}"):${ros1_master_port}
        - ros2 run ros1_bridge parameter_bridge --config /config/ros_bridge_params.yaml